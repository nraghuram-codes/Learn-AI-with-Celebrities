services:
  - type: web
    name: learn-with-celebs-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: learn-with-celebs-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        value: https://your-frontend-domain.vercel.app

databases:
  - name: learn-with-celebs-db
    databaseName: ai_learning_platform
    user: learn_with_celebs_user
